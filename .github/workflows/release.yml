name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Module version without leading v
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: changelog-append
  cancel-in-progress: false

jobs:
  package:
    name: package
    runs-on: windows-2025-vs2026
    timeout-minutes: 25

    steps:
      - name: Checkout module
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: WKOpenVR.SyntheticFaceModule

      - name: Checkout SDK
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/WKOpenVR.FaceTracking.Sdk
          fetch-depth: 0
          path: WKOpenVR.FaceTracking.Sdk

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Validate workflow scripts
        shell: pwsh
        working-directory: WKOpenVR.SyntheticFaceModule
        run: |
          ./.github/scripts/Test-WorkflowSyntax.ps1
          ./.github/scripts/Test-UpdateChangelog.ps1
          ./.github/scripts/Test-NightlyBetaPlan.ps1
          ./.github/scripts/Test-ReleaseVersionSequence.ps1
          ./.github/scripts/Test-GenerateReleaseNotes.ps1

      - name: Validate release version sequence
        shell: pwsh
        working-directory: WKOpenVR.SyntheticFaceModule
        env:
          TAG_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $version = $env:INPUT_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $env:TAG_NAME -replace '^v', ''
          }
          if ([string]::IsNullOrWhiteSpace($version)) { throw "Release version is empty." }
          ./.github/scripts/Assert-ReleaseVersionSequence.ps1 -Tag "v$version"

      - name: Promote Unreleased -> tagged section
        shell: pwsh
        working-directory: WKOpenVR.SyntheticFaceModule
        env:
          TAG_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $version = $env:INPUT_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $env:TAG_NAME -replace '^v', ''
          }
          if ([string]::IsNullOrWhiteSpace($version)) { throw "Release version is empty." }

          $tag = $env:TAG_NAME
          $releaseRef = "refs/tags/$tag"
          if ($env:REF_TYPE -ne "tag") {
            $tag = "v$version"
            $releaseRef = "HEAD"
          }

          git fetch --tags --force
          $describeArgs = @("describe", "--tags", "--abbrev=0", "--match", "v*")
          if ($tag -notmatch "-") {
            $describeArgs += @("--exclude", "*-*")
          }
          $describeArgs += "$releaseRef^"
          $prevTag = & git @describeArgs 2>$null
          if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($prevTag)) {
            Write-Host "Preloading changelog entries from $prevTag..$releaseRef before promotion."
            ./.github/scripts/Update-Changelog.ps1 -Mode Append -Range "$prevTag..$releaseRef"
          } else {
            Write-Host "No previous release tag found; promoting the current Unreleased section."
          }

          ./.github/scripts/Update-Changelog.ps1 -Mode Promote -Version $tag
          New-Item -ItemType Directory -Force -Path .changelog-stash | Out-Null
          Copy-Item CHANGELOG.md .changelog-stash/CHANGELOG.md -Force

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-synthetic-release-${{ runner.os }}-${{ hashFiles('WKOpenVR.SyntheticFaceModule/**/*.csproj', 'WKOpenVR.FaceTracking.Sdk/**/*.csproj') }}
          restore-keys: |
            nuget-synthetic-release-${{ runner.os }}-

      - name: Build tagged SDK package
        shell: pwsh
        working-directory: WKOpenVR.FaceTracking.Sdk
        env:
          TAG_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $version = $env:INPUT_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $env:TAG_NAME -replace '^v', ''
          }
          if ([string]::IsNullOrWhiteSpace($version)) { throw "Release version is empty." }
          .\build.ps1 -Configuration Release -Version $version

      - name: Build tagged module package
        id: package
        shell: pwsh
        working-directory: WKOpenVR.SyntheticFaceModule
        env:
          TAG_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $version = $env:INPUT_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $env:TAG_NAME -replace '^v', ''
          }
          if ([string]::IsNullOrWhiteSpace($version)) { throw "Release version is empty." }
          if ($version -match '-beta' -and $version -notmatch '^\d{4}\.\d+\.\d+\.\d+-beta$') {
            throw "Beta versions must use YYYY.M.D.N-beta."
          }

          .\build.ps1 -Configuration Release -Version $version -SdkVersion $version
          .\test.ps1 -Configuration Release -SdkVersion $version
          .\pack.ps1 -Configuration Release -Version $version -SdkVersion $version

          $payload = "artifacts/packages/WKOpenVR.SyntheticFaceModule.$version.zip"
          $manifest = "artifacts/packages/WKOpenVR.SyntheticFaceModule.$version.manifest.json"
          if (-not (Test-Path -LiteralPath $payload)) { throw "Expected payload missing: $payload" }
          if (-not (Test-Path -LiteralPath $manifest)) { throw "Expected manifest missing: $manifest" }
          $payloadItem = Get-Item -LiteralPath $payload
          $manifestItem = Get-Item -LiteralPath $manifest
          $payloadSha = (Get-FileHash -LiteralPath $payloadItem.FullName -Algorithm SHA256).Hash.ToUpperInvariant()
          $manifestSha = (Get-FileHash -LiteralPath $manifestItem.FullName -Algorithm SHA256).Hash.ToUpperInvariant()
          $integrityName = "WKOpenVR.SyntheticFaceModule.$version.integrity.tsv"
          $integrity = Join-Path "artifacts/packages" $integrityName
          $integrityRows = @(
            "path`tbytes`tsha256",
            "$($payloadItem.Name)`t$($payloadItem.Length)`t$payloadSha",
            "$($manifestItem.Name)`t$($manifestItem.Length)`t$manifestSha"
          )
          [System.IO.File]::WriteAllLines($integrity, [string[]]$integrityRows, [System.Text.UTF8Encoding]::new($false))

          $isBeta = $version -match '-beta$'
          $tag = $env:TAG_NAME
          if ($env:REF_TYPE -ne "tag") {
            $tag = "v$version"
          }
          $artifactPaths = [string[]]@($payload, $manifest)
          $notesOutput = & .\.github\scripts\Generate-ReleaseNotes.ps1 `
            -Tag $tag `
            -Repo '${{ github.repository }}' `
            -PackageName 'WKOpenVR Synthetic Face Module' `
            -ArtifactPath $artifactPaths `
            -IntegrityName $integrityName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $notes = ($notesOutput -join [System.Environment]::NewLine) + [System.Environment]::NewLine
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          [System.IO.File]::WriteAllText($notesPath, $notes, (New-Object System.Text.UTF8Encoding($false)))

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT
          "is_beta=$($isBeta.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Upload module artifact
        uses: actions/upload-artifact@v7
        with:
          name: wkopenvr-synthetic-face-module-${{ github.ref_name }}
          path: |
            WKOpenVR.SyntheticFaceModule/artifacts/packages/*.zip
            WKOpenVR.SyntheticFaceModule/artifacts/packages/*.manifest.json
            WKOpenVR.SyntheticFaceModule/artifacts/packages/*.integrity.tsv
          if-no-files-found: error

      - name: Checkout module registry
        if: ${{ steps.package.outputs.is_beta == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/wkopenvr-module-registry
          token: ${{ secrets.MIRROR_RELEASE_TOKEN }}
          fetch-depth: 0
          path: wkopenvr-module-registry

      - name: Publish beta package to module registry
        if: ${{ steps.package.outputs.is_beta == 'true' }}
        shell: pwsh
        working-directory: wkopenvr-module-registry
        env:
          REGISTRY_TOKEN: ${{ secrets.MIRROR_RELEASE_TOKEN }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:REGISTRY_TOKEN)) {
            throw "MIRROR_RELEASE_TOKEN secret is required to publish beta packages to the module registry."
          }
          if ([string]::IsNullOrWhiteSpace($env:VERSION)) {
            throw "Package version is empty."
          }

          $workspace = Split-Path -Parent (Get-Location).Path
          $packageDir = Join-Path $workspace "WKOpenVR.SyntheticFaceModule\artifacts\packages"
          $payload = Join-Path $packageDir ("WKOpenVR.SyntheticFaceModule." + $env:VERSION + ".zip")
          $manifest = Join-Path $packageDir ("WKOpenVR.SyntheticFaceModule." + $env:VERSION + ".manifest.json")
          if (-not (Test-Path -LiteralPath $payload)) { throw "Expected payload missing: $payload" }
          if (-not (Test-Path -LiteralPath $manifest)) { throw "Expected manifest missing: $manifest" }

          python .\scripts\import_synthetic_release.py --payload $payload --manifest $manifest --beta
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\test.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\lint.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add v1
          git diff --cached --quiet
          $diffCode = $LASTEXITCODE
          if ($diffCode -eq 0) {
            Write-Host "Registry already contains WKOpenVR.SyntheticFaceModule $env:VERSION."
          } elseif ($diffCode -eq 1) {
            git commit -m "feat(registry): publish synthetic face module $env:VERSION"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            git push origin HEAD:main
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            throw "git diff --cached failed with exit code $diffCode"
          }

      - name: Publish GitHub release
        shell: pwsh
        working-directory: WKOpenVR.SyntheticFaceModule
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.package.outputs.tag }}
          IS_BETA: ${{ steps.package.outputs.is_beta }}
          NOTES_PATH: ${{ steps.package.outputs.notes_path }}
        run: |
          $assets = @(Get-ChildItem -Path "artifacts/packages" -Include "*.zip", "*.manifest.json", "*.integrity.tsv" -Recurse | ForEach-Object { $_.FullName })
          if ($assets.Count -eq 0) { throw "No release assets found." }

          $extra = @()
          if ($env:IS_BETA -eq "true") { $extra = @("--prerelease", "--latest=false") }

          gh release create $env:TAG_NAME --title $env:TAG_NAME --notes-file $env:NOTES_PATH @extra @assets
          if ($LASTEXITCODE -ne 0) { throw "gh release create failed." }

      - name: Commit promoted CHANGELOG.md back to main
        continue-on-error: true
        shell: bash
        working-directory: WKOpenVR.SyntheticFaceModule
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ steps.package.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch origin main
          if cmp -s .changelog-stash/CHANGELOG.md <(git show origin/main:CHANGELOG.md 2>/dev/null); then
            echo "main already carries the promoted changelog."
            exit 0
          fi

          expected_oid=$(git rev-parse origin/main)
          changelog_b64=$(base64 -w 0 .changelog-stash/CHANGELOG.md)
          headline="docs(changelog): promote Unreleased -> ${TAG_NAME} [skip changelog]"
          body="Promoted by .github/workflows/release.yml after publishing ${TAG_NAME}."

          payload=$(jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg headline "$headline" \
            --arg body "$body" \
            --arg oid "$expected_oid" \
            --arg changelog "$changelog_b64" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid url } } }",
              variables: {
                input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: "main" },
                  message: { headline: $headline, body: $body },
                  fileChanges: {
                    additions: [
                      { path: "CHANGELOG.md", contents: $changelog }
                    ]
                  },
                  expectedHeadOid: $oid
                }
              }
            }')

          response=$(printf '%s' "$payload" | gh api graphql --input -)
          echo "$response" | jq .
          if echo "$response" | jq -e '.errors // empty' >/dev/null; then
            echo "::error::createCommitOnBranch returned GraphQL errors"
            exit 1
          fi

          new_oid=$(echo "$response" | jq -r '.data.createCommitOnBranch.commit.oid')
          if [[ -z "$new_oid" || "$new_oid" == "null" ]]; then
            echo "::error::createCommitOnBranch did not return a commit oid"
            exit 1
          fi

          verified=$(gh api "repos/$GITHUB_REPOSITORY/commits/$new_oid" --jq '.commit.verification.verified')
          if [[ "$verified" != "true" ]]; then
            echo "::error::Commit $new_oid is not verified (got: $verified)"
            gh api "repos/$GITHUB_REPOSITORY/commits/$new_oid" --jq '.commit.verification'
            exit 1
          fi
          echo "Verified promote commit: $new_oid"
